name: Nvdr
options:
  bundleIdPrefix: com.oriolgomez
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Release
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.2"
    DEVELOPMENT_TEAM: 4TH9Y6ZAQC
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.7.0"
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    from: "3.0.0"

targets:
  Nvdr:
    type: application
    platform: iOS
    sources:
      - path: Nvdr
    info:
      path: Nvdr/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: nvdr
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIBackgroundModes:
          - audio
    dependencies:
      - package: Citadel
      - package: swift-crypto
        product: _CryptoExtras
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oriolgomez.nvdr
        PRODUCT_NAME: Nvdr
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
