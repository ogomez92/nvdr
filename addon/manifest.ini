name = nvdrBridge
summary = "NVDA Remote via nvdr (intermediary)"
description = """Bridges this NVDA to a remote NVDA over the NVDA Remote relay
protocol, using the nvdr binary as an intermediary process. It does not connect
at startup: press NVDA+F11 once to connect, then again to toggle key forwarding
on/off. While on, all keystrokes (except NVDA+F11) go to the remote machine,
and the remote NVDA's speech is spoken locally."""
author = "ogomez.s92@gmail.com"
url = ""
version = 0.1.0
minimumNVDAVersion = 2023.1.0
lastTestedNVDAVersion = 2025.1.0
updateChannel = None
